name: Automotive Copilot CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ===============================================
  # JOB 1: INFRASTRUCTURE (Terraform)
  # ===============================================
  terraform-deploy:
    name: Terraform Validate & Plan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init
        working-directory: ./infrastructure/aws

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./infrastructure/aws

  # ===============================================
  # JOB 2: TRANSFORMATION (dbt)
  # ===============================================
  dbt-deploy:
    name: dbt Analytics CI/CD
    runs-on: ubuntu-latest
    needs: terraform-deploy # Waits for Terraform to succeed first!
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dbt-snowflake
        run: pip install dbt-snowflake

      - name: dbt Run (Deploy to Prod)
        run: dbt run --target prod
        working-directory: ./transformation/dbt_project
        env:
          # GitHub SECRETS inject the .env passwords safely inside the GitHub computers
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
